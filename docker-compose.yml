services:
  navigator:
    build:
      context: .
      dockerfile: Dockerfile
    image: veil
    restart: unless-stopped
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4200/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
